name: Build Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package_script: package:win
            artifact: fnc-windows-x64
            artifact_path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            package_script: package:linux
            artifact: fnc-linux-x64
            artifact_path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle
          - os: macos-13
            target: x86_64-apple-darwin
            package_script: package:mac:intel
            artifact: fnc-macos-intel
            artifact_path: src-tauri/target/x86_64-apple-darwin/release/bundle
          - os: macos-14
            target: aarch64-apple-darwin
            package_script: package:mac
            artifact: fnc-macos-apple-silicon
            artifact_path: src-tauri/target/aarch64-apple-darwin/release/bundle

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build bundles
        run: npm run ${{ matrix.package_script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
