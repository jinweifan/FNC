<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First NC Viewer</title>
    <script>
      (() => {
        try {
          const urlTheme = new URLSearchParams(window.location.search).get("theme");
          const transparentMode = new URLSearchParams(window.location.search).get("transparent") === "1";
          const storedTheme = localStorage.getItem("fnc.themeMode");
          const storedLang = localStorage.getItem("fnc.lang");
          const normalizedTheme = (urlTheme || (storedTheme === "dark" ? "navy" : storedTheme));
          const systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = normalizedTheme === "light"
            ? "light"
            : normalizedTheme === "navy"
              ? "navy"
              : normalizedTheme === "xdark" || normalizedTheme === "dark"
                ? "dark"
                : (systemDark ? "dark" : "light");
          const locale = storedLang === "en-US" ? "en-US" : "zh-CN";
          const themeBackground = theme === "light" ? "#eef2f7" : (theme === "navy" ? "#020617" : "#000000");
          const themeText = theme === "light" ? "#0f172a" : (theme === "navy" ? "#dbeafe" : "#e7e9ea");
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.setAttribute("lang", locale);
          document.documentElement.style.backgroundColor = transparentMode ? "transparent" : themeBackground;
          document.documentElement.style.color = themeText;
          document.documentElement.style.colorScheme = theme === "light" ? "light" : "dark";
        } catch {
        }
      })();
    </script>
    <style>
      :root {
        --bg: #eef2f7;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #d1dbe8;
        --progress-a: #22d3ee;
        --progress-b: #38bdf8;
        --progress-c: #60a5fa;
      }
      :root[data-theme="navy"] {
        --bg: #020617;
        --panel: #0f172a;
        --text: #dbeafe;
        --muted: #94a3b8;
        --border: #334155;
      }
      :root[data-theme="dark"] {
        --bg: #000000;
        --panel: #16181c;
        --text: #e7e9ea;
        --muted: #71767b;
        --border: #2f3336;
      }
      * {
        box-sizing: border-box;
        -webkit-user-select: none;
        user-select: none;
      }
      html, body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        min-width: 100vw;
        min-height: 100vh;
        overflow: hidden;
        background: transparent;
        color: var(--text);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .stage {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        background: transparent;
      }
      .brand {
        width: 100%;
        height: 100%;
        display: grid;
        justify-items: center;
        align-content: center;
        gap: 14px;
        text-align: center;
        padding: 24px 28px;
        border-radius: 20px;
        border: 1px solid color-mix(in srgb, var(--border) 74%, transparent);
        background:
          radial-gradient(circle at 18% 18%, color-mix(in srgb, var(--panel) 84%, white 16%) 0%, transparent 34%),
          linear-gradient(180deg, color-mix(in srgb, var(--bg) 90%, var(--panel)) 0%, var(--panel) 100%);
        box-shadow:
          0 22px 56px rgba(15, 23, 42, 0.18),
          inset 0 1px 0 color-mix(in srgb, white 24%, transparent);
        backdrop-filter: blur(10px);
        overflow: hidden;
      }
      .logo {
        width: min(220px, 56%);
        max-width: 100%;
        display: block;
        filter: drop-shadow(0 10px 20px rgba(15, 23, 42, 0.14));
      }
      .loader {
        width: 40px;
        height: 40px;
        display: grid;
        place-items: center;
        position: relative;
        filter: drop-shadow(0 8px 18px rgba(15, 23, 42, 0.16));
      }
      .loader-ring,
      .loader-orbit {
        position: absolute;
        inset: 0;
        border-radius: 999px;
      }
      .loader-ring {
        border: 2px solid color-mix(in srgb, var(--border) 72%, transparent);
        border-top-color: color-mix(in srgb, var(--text) 28%, var(--progress-b));
        opacity: 0.92;
      }
      .loader-orbit {
        animation: spin 1.05s linear infinite;
      }
      .loader-orbit::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 50%;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        transform: translateX(-50%);
        background: linear-gradient(135deg, var(--progress-a), var(--progress-c));
        box-shadow:
          0 0 0 2px color-mix(in srgb, var(--panel) 78%, transparent),
          0 0 14px color-mix(in srgb, var(--progress-b) 58%, transparent);
      }
      .loader-core {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--panel) 88%, transparent);
        border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
        box-shadow: inset 0 1px 0 color-mix(in srgb, white 28%, transparent);
      }
      .logo-dark {
        display: none;
      }
      :root[data-theme="light"] .logo-light {
        display: block;
      }
      :root[data-theme="light"] .logo-dark {
        display: none;
      }
      :root[data-theme="navy"] .logo-light,
      :root[data-theme="dark"] .logo-light {
        display: none;
      }
      :root[data-theme="navy"] .logo-dark,
      :root[data-theme="dark"] .logo-dark {
        display: block;
      }
      .title {
        font-size: 22px;
        line-height: 1.15;
        font-weight: 700;
        letter-spacing: 0.01em;
      }
      .subtitle {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
        font-weight: 500;
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
    <script>
      (() => {
        try {
          const locale = document.documentElement.getAttribute("lang") === "en-US" ? "en-US" : "zh-CN";
          document.addEventListener("DOMContentLoaded", () => {
            const subtitle = document.getElementById("subtitle");
            if (subtitle) {
              subtitle.textContent = locale === "en-US" ? "Loading workspace" : "加载工作区";
            }
          }, { once: true });
        } catch {
        }
      })();
    </script>
  </head>
  <body>
    <div class="stage">
      <div class="brand">
        <img class="logo logo-light" src="/logo-fnc-art.png" alt="First NC Viewer" />
        <img class="logo logo-dark" src="/logo-fnc-art-dark.png" alt="First NC Viewer" />
        <div>
          <div class="title">First NC Viewer</div>
          <div class="subtitle" id="subtitle">Loading workspace</div>
        </div>
        <div class="loader" aria-hidden="true">
          <div class="loader-ring"></div>
          <div class="loader-orbit"></div>
          <div class="loader-core"></div>
        </div>
      </div>
    </div>
  </body>
</html>
