<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --boot-bg: #020617;
        --boot-text: #dbeafe;
        --boot-panel: #0f172a;
        --boot-border: #334155;
        --boot-muted: #94a3b8;
      }
      html, body, #root {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--boot-bg);
        color: var(--boot-text);
      }
      body {
        overflow: hidden;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: var(--boot-bg);
        color: var(--boot-text);
        z-index: 9999;
        opacity: 1;
        transition: opacity 180ms ease;
      }
      #boot-splash.boot-hide {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash .boot-card {
        width: min(520px, calc(100vw - 48px));
        padding: 18px 18px 16px;
        border-radius: 16px;
        background: color-mix(in srgb, var(--boot-panel) 92%, transparent);
        border: 1px solid color-mix(in srgb, var(--boot-border) 70%, transparent);
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(10px);
      }
      #boot-splash .boot-title {
        font-size: 18px;
        font-weight: 650;
        letter-spacing: 0.2px;
      }
      #boot-splash .boot-subtitle {
        margin-top: 6px;
        font-size: 13px;
        color: var(--boot-muted);
      }
      #boot-splash .boot-spinner {
        margin-top: 14px;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        border: 2px solid color-mix(in srgb, var(--boot-muted) 35%, transparent);
        border-top-color: color-mix(in srgb, var(--boot-text) 85%, transparent);
        animation: boot-spin 700ms linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("fnc.themeMode");
          const normalized = stored === "dark" ? "navy" : stored;
          const systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = normalized === "light"
            ? "light"
            : normalized === "navy"
              ? "navy"
              : normalized === "xdark"
                ? "dark"
                : (systemDark ? "dark" : "light");
          const palette = theme === "navy"
            ? { background: "#020617", text: "#dbeafe", panel: "#0f172a", border: "#334155", muted: "#94a3b8" }
            : theme === "dark"
              ? { background: "#000000", text: "#e7e9ea", panel: "#16181c", border: "#2f3336", muted: "#71767b" }
              : { background: "#eef2f7", text: "#0f172a", panel: "#ffffff", border: "#d1dbe8", muted: "#64748b" };
          const root = document.documentElement;
          root.setAttribute("data-theme", theme);
          root.style.backgroundColor = palette.background;
          root.style.color = palette.text;
          root.style.colorScheme = theme === "light" ? "light" : "dark";
          root.style.setProperty("--boot-bg", palette.background);
          root.style.setProperty("--boot-text", palette.text);
          root.style.setProperty("--boot-panel", palette.panel);
          root.style.setProperty("--boot-border", palette.border);
          root.style.setProperty("--boot-muted", palette.muted);
          document.addEventListener("DOMContentLoaded", () => {
            document.body.style.backgroundColor = palette.background;
            document.body.style.color = palette.text;
            const mount = document.getElementById("root");
            if (mount) {
              mount.style.backgroundColor = palette.background;
              mount.style.color = palette.text;
            }
          }, { once: true });
        } catch {
        }
      })();
    </script>
    <title>First NC Viewer</title>
  </head>
  <body>
    <div id="boot-splash" role="status" aria-live="polite">
      <div class="boot-card">
        <div class="boot-title">First NC Viewer</div>
        <div class="boot-subtitle">正在启动…</div>
        <div class="boot-spinner" aria-hidden="true"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (() => {
        const closeExternalSplash = () => {
          try {
            if (typeof window === 'undefined') return
            if (!('__TAURI_INTERNALS__' in window)) return
            // Tauri injects `__TAURI_INTERNALS__`. Prefer direct invoke to avoid waiting on module graph.
            // eslint-disable-next-line @typescript-eslint/no-explicit-any
            const internals = (window).__TAURI_INTERNALS__
            if (internals && typeof internals.invoke === 'function') {
              void internals.invoke('notify_startup_boot_ready')
            }
          } catch {
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', closeExternalSplash, { once: true })
        } else {
          closeExternalSplash()
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
